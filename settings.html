<!DOCTYPE html>
<html lang="en">
  <head>
    <title>KokoaTalk - Settings</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="phone">
      <div class="status-bar">
        <div class="status-bar__column">No Service <i class="fa-solid fa-wifi"></i></div>
        <div class="status-bar__column">21:23</div>
        <div class="status-bar__column"><i class="fa-solid fa-lock"></i><span>100%</span><span class="battery"><span class="battery__level"></span></span></div>
      </div>
      <main class="screen">
        <header class="page-header page-header--center">
          <div class="page-header__side"><a class="icon-link" href="more.html"><i class="fa-solid fa-chevron-left"></i></a></div>
          <h1 class="page-title page-title--small">Settings</h1>
          <div class="page-header__side"><a class="icon-link" href="#"><i class="fa-solid fa-magnifying-glass"></i></a></div>
        </header>
        <section class="settings-list">
          <div class="settings-group">
            <div class="settings-row"><i class="fa-solid fa-bullhorn"></i><span>Notices</span><span></span></div>
            <div class="settings-row"><i class="fa-solid fa-flask"></i><span>Kakao Lab</span><span></span></div>
            <div class="settings-row"><i class="fa-solid fa-circle-info"></i><span>Version</span><span class="settings-row__side">Latest Version</span></div>
          </div>
          <div class="settings-group">
            <div class="settings-row"><i class="fa-solid fa-lock"></i><span>Privacy</span><span></span></div>
            <div class="settings-row"><i class="fa-regular fa-bell"></i><span>Notifications</span><span></span></div>
            <div class="settings-row"><i class="fa-regular fa-user"></i><span>Friends</span><span></span></div>
            <div class="settings-row"><i class="fa-regular fa-comment"></i><span>Chats</span><span></span></div>
            <div class="settings-row"><i class="fa-regular fa-sun"></i><span>Display <span class="new-badge">N</span></span><span></span></div>
            <div class="settings-row"><i class="fa-solid fa-brush"></i><span>Themes <span class="new-badge">N</span></span><span class="settings-row__side">Default theme</span></div>
            <div class="settings-row"><i class="fa-solid fa-phone"></i><span>Call</span><span></span></div>
          </div>
        </section>
      </main>
      <nav class="nav">
        <a class="nav__link" href="friends.html"><i class="fa-regular fa-user"></i></a>
        <a class="nav__link" href="chats.html"><i class="fa-regular fa-comment"></i></a>
        <a class="nav__link" href="find.html"><i class="fa-solid fa-magnifying-glass"></i></a>
        <a class="nav__link nav__link--active" href="more.html"><i class="fa-solid fa-ellipsis"></i><span class="dot nav__dot"></span></a>
      </nav>
    </div>
    <script src="https://kit.fontawesome.com/b5ac015c11.js" crossorigin="anonymous"></script>
  </body>
</html>
