<!DOCTYPE html>
<html lang="en">
  <head>
    <title>KokoaTalk - Friends</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="phone">
      <div class="status-bar">
        <div class="status-bar__column">No Service <i class="fa-solid fa-wifi"></i></div>
        <div class="status-bar__column">21:23</div>
        <div class="status-bar__column"><i class="fa-solid fa-lock"></i><span>100%</span><span class="battery"><span class="battery__level"></span></span></div>
      </div>
      <main class="screen">
        <header class="page-header">
          <h1 class="page-title">Friends</h1>
          <div class="header-icons">
            <a class="icon-link" href="#"><i class="fa-solid fa-magnifying-glass"></i></a>
            <a class="icon-link" href="#"><i class="fa-solid fa-music"></i></a>
            <a class="icon-link settings-link" href="settings.html"><i class="fa-solid fa-gear"></i></a>
          </div>
        </header>
        <div class="notice-strip"><i class="fa-solid fa-circle-info"></i> Friends' Names Display <i class="fa-solid fa-chevron-right"></i></div>
        <section class="user-row profile-row">
          <div class="avatar avatar--round"></div>
          <h2 class="user-row__title">Nicolas</h2>
        </section>
        <div class="divider"></div>
        <p class="section-label">Channel <i class="fa-solid fa-chevron-up" style="float: right"></i></p>
        <section class="channel-row">
          <div class="channel-row__main">
            <div class="avatar avatar--sm avatar--channel">Ch</div>
            <span class="channel-row__title">Channel</span>
          </div>
          <span class="channel-row__count">2 <i class="fa-solid fa-chevron-right"></i></span>
        </section>
      </main>
      <nav class="nav">
        <a class="nav__link nav__link--active" href="friends.html"><i class="fa-solid fa-user"></i></a>
        <a class="nav__link" href="chats.html"><i class="fa-regular fa-comment"></i><span class="badge nav__badge">1</span></a>
        <a class="nav__link" href="find.html"><i class="fa-solid fa-magnifying-glass"></i></a>
        <a class="nav__link" href="more.html"><i class="fa-solid fa-ellipsis"></i><span class="dot nav__dot"></span></a>
      </nav>
    </div>
    <script src="https://kit.fontawesome.com/b5ac015c11.js" crossorigin="anonymous"></script>
  </body>
</html>
