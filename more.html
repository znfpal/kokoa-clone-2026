<!DOCTYPE html>
<html lang="en">
  <head>
    <title>KokoaTalk - More</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="phone">
      <div class="status-bar">
        <div class="status-bar__column">No Service <i class="fa-solid fa-wifi"></i></div>
        <div class="status-bar__column">21:23</div>
        <div class="status-bar__column"><i class="fa-solid fa-lock"></i><span>100%</span><span class="battery"><span class="battery__level"></span></span></div>
      </div>
      <main class="screen">
        <header class="page-header">
          <h1 class="page-title">More</h1>
          <div class="header-icons">
            <a class="icon-link" href="#"><i class="fa-solid fa-magnifying-glass"></i></a>
            <a class="icon-link" href="#"><i class="fa-solid fa-music"></i></a>
            <a class="icon-link settings-link" href="settings.html"><i class="fa-solid fa-gear"></i><span class="dot"></span></a>
          </div>
        </header>
        <section class="more-profile">
          <div class="user-row">
            <div class="avatar avatar--round"></div>
            <div>
              <h2 class="user-row__title">Nicolas</h2>
              <p class="user-row__subtitle">+1 787-493-4219 <i class="fa-solid fa-circle-exclamation" style="color: #ff5942"></i></p>
            </div>
          </div>
          <a class="more-profile__chat" href="chats.html"><i class="fa-regular fa-message"></i></a>
        </section>
        <section class="more-grid">
          <a class="more-item" href="#"><i class="fa-regular fa-calendar-check"></i>Calendar</a>
          <a class="more-item" href="#"><i class="fa-regular fa-square-minus"></i><span class="dot"></span>Talk Drive</a>
          <a class="more-item" href="#"><i class="fa-regular fa-face-smile"></i>Emoticons</a>
          <a class="more-item" href="#"><i class="fa-regular fa-calendar"></i>Themes</a>
          <a class="more-item" href="#"><i class="fa-solid fa-network-wired"></i>Account</a>
          <a class="more-item" href="#"><i class="fa-regular fa-comments"></i>Openchat</a>
        </section>
        <section class="suggestions">
          <h2 class="suggestions__title">Suggestions</h2>
          <div class="suggestions__list">
            <a class="suggestion" href="#"><span class="suggestion__icon"><i class="fa-solid fa-quote-right"></i></span>Kakao Story</a>
            <a class="suggestion" href="#"><span class="suggestion__icon" style="color: #3b1e1e"><i class="fa-regular fa-face-smile"></i></span>kakao friends</a>
            <a class="suggestion" href="#"><span class="suggestion__icon" style="background: linear-gradient(135deg, #79ce71, #ffb13b)"><i class="fa-solid fa-gamepad"></i></span>Friends Gem</a>
          </div>
        </section>
      </main>
      <nav class="nav">
        <a class="nav__link" href="friends.html"><i class="fa-regular fa-user"></i></a>
        <a class="nav__link" href="chats.html"><i class="fa-regular fa-comment"></i></a>
        <a class="nav__link" href="find.html"><i class="fa-solid fa-magnifying-glass"></i></a>
        <a class="nav__link nav__link--active" href="more.html"><i class="fa-solid fa-ellipsis"></i><span class="dot nav__dot"></span></a>
      </nav>
    </div>
    <script src="https://kit.fontawesome.com/b5ac015c11.js" crossorigin="anonymous"></script>
  </body>
</html>
