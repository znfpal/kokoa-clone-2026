<!DOCTYPE html>
<html lang="en">
  <head>
    <title>KokoaTalk - Find</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="phone">
      <div class="status-bar">
        <div class="status-bar__column">No Service <i class="fa-solid fa-wifi"></i></div>
        <div class="status-bar__column">21:23</div>
        <div class="status-bar__column"><i class="fa-solid fa-lock"></i><span>100%</span><span class="battery"><span class="battery__level"></span></span></div>
      </div>
      <main class="screen">
        <header class="page-header">
          <h1 class="page-title">Find</h1>
          <div class="header-icons">
            <a class="icon-link" href="#"><i class="fa-solid fa-magnifying-glass"></i></a>
            <a class="icon-link settings-link" href="settings.html"><i class="fa-solid fa-gear"></i><span class="dot"></span></a>
          </div>
        </header>
        <section class="find-icons">
          <a class="find-icon" href="#"><i class="fa-solid fa-qrcode"></i><span>QR Code</span></a>
          <a class="find-icon" href="#"><i class="fa-regular fa-address-card"></i><span>Add by<br />Contacts</span></a>
          <a class="find-icon" href="#"><i class="fa-regular fa-id-badge"></i><span>Add by ID</span></a>
          <a class="find-icon" href="#"><i class="fa-regular fa-envelope"></i><span>Invite</span></a>
        </section>
        <section class="recommended">
          <p class="section-label">Recommended Friends</p>
          <p class="recommended__empty">You have no recommended friends.</p>
        </section>
        <section class="openchat">
          <div class="openchat__header">
            <span>Open Chat</span>
            <a class="openchat__home" href="#">Go to Openchat Home <i class="fa-solid fa-chevron-right"></i></a>
          </div>
          <article class="openchat-card">
            <div>
              <h2 class="openchat-card__title">#BTS</h2>
              <p class="openchat-card__tags">#BTS#ARMY#FRIENDS</p>
              <p class="openchat-card__meta">802 members | <span class="openchat-card__status">Active</span></p>
            </div>
            <div class="openchat-card__thumb"><span class="openchat-card__like"><i class="fa-solid fa-heart"></i>326</span></div>
          </article>
          <article class="openchat-card">
            <div>
              <h2 class="openchat-card__title">Bts Gang~</h2>
              <p class="openchat-card__tags">#englishonly #ipurpleyou #jimin #taeta...</p>
              <p class="openchat-card__meta">299 members | <span class="openchat-card__status">Active</span></p>
            </div>
            <div class="openchat-card__thumb"><span class="openchat-card__like"><i class="fa-solid fa-heart"></i>215</span></div>
          </article>
        </section>
      </main>
      <nav class="nav">
        <a class="nav__link" href="friends.html"><i class="fa-regular fa-user"></i></a>
        <a class="nav__link" href="chats.html"><i class="fa-regular fa-comment"></i></a>
        <a class="nav__link nav__link--active" href="find.html"><i class="fa-solid fa-magnifying-glass"></i></a>
        <a class="nav__link" href="more.html"><i class="fa-solid fa-ellipsis"></i><span class="dot nav__dot"></span></a>
      </nav>
    </div>
    <script src="https://kit.fontawesome.com/b5ac015c11.js" crossorigin="anonymous"></script>
  </body>
</html>
