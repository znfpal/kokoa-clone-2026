<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Momentum Clone</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <section class="top-bar">
        <div id="weather" class="weather">Loading weather...</div>
      </section>

      <section class="center-box">
        <h1 id="clock">00:00:00</h1>

        <form id="login-form" class="login-form">
          <input
            required
            maxlength="15"
            type="text"
            placeholder="What is your name?"
          />
          <button type="submit">Login</button>
        </form>

        <div id="greeting-box" class="hidden">
          <h2 id="greeting"></h2>
          <button id="logout-button" type="button">Change name</button>
        </div>
      </section>

      <section class="todo-box">
        <h3>Today Todo</h3>
        <form id="todo-form">
          <input required type="text" placeholder="Write a todo" />
        </form>
        <ul id="todo-list"></ul>
      </section>
    </main>

    <script src="./main.js"></script>
  </body>
</html>
