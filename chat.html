<!DOCTYPE html>
<html lang="en">
  <head>
    <title>KokoaTalk - Chat</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="phone">
      <div class="status-bar">
        <div class="status-bar__column">No Service <i class="fa-solid fa-wifi"></i></div>
        <div class="status-bar__column">21:28</div>
        <div class="status-bar__column"><i class="fa-solid fa-lock"></i><span>100%</span><span class="battery"><span class="battery__level"></span></span></div>
      </div>
      <main class="screen screen--chat">
        <div class="chat-top">
          <header class="page-header page-header--center">
            <div class="page-header__side"><a class="icon-link" href="chats.html"><i class="fa-solid fa-chevron-left"></i></a></div>
            <h1 class="page-title page-title--small">Nicolás Serrano</h1>
            <div class="page-header__side">
              <a class="icon-link" href="#"><i class="fa-solid fa-magnifying-glass"></i></a>
              <a class="icon-link" href="#"><i class="fa-solid fa-bars"></i></a>
            </div>
          </header>
        </div>
        <div class="chat-date">Tuesday, June 30, 2020</div>
        <section class="message-row">
          <div class="avatar avatar--sm avatar--purple"></div>
          <div>
            <p class="message__author">Nicolás Serrano</p>
            <div class="message__bubble-wrap">
              <span class="message__bubble">Hi!</span>
              <span class="message__time">21:27</span>
            </div>
          </div>
        </section>
        <section class="message-row message-row--own">
          <div class="message__bubble-wrap">
            <span class="message__bubble">What’s up?</span>
            <span class="message__time">21:27</span>
          </div>
        </section>
      </main>
      <form class="reply">
        <div class="reply__bar">
          <span class="reply__plus"><i class="fa-solid fa-plus"></i></span>
          <div class="reply__input">
            <span>Hi!</span>
            <span class="reply__icons"><i class="fa-regular fa-face-smile reply__emoji"></i><button class="reply__send" type="button"><i class="fa-solid fa-arrow-up"></i></button></span>
          </div>
        </div>
        <div class="keyboard">
          <div class="keyboard__row"><span class="key">q</span><span class="key">w</span><span class="key">e</span><span class="key">r</span><span class="key">t</span><span class="key">y</span><span class="key">u</span><span class="key">i</span><span class="key">o</span><span class="key">p</span></div>
          <div class="keyboard__row"><span class="key">a</span><span class="key">s</span><span class="key">d</span><span class="key">f</span><span class="key">g</span><span class="key">h</span><span class="key">j</span><span class="key">k</span><span class="key">l</span></div>
          <div class="keyboard__row"><span class="key key--gray"><i class="fa-regular fa-square-caret-up"></i></span><span class="key">z</span><span class="key">x</span><span class="key">c</span><span class="key">v</span><span class="key">b</span><span class="key">n</span><span class="key">m</span><span class="key key--gray"><i class="fa-solid fa-delete-left"></i></span></div>
          <div class="keyboard__row"><span class="key key--gray">123</span><span class="key key--gray"><i class="fa-solid fa-globe"></i></span><span class="key"><i class="fa-solid fa-microphone"></i></span><span class="key key--wide">space</span><span class="key key--gray">return</span></div>
        </div>
      </form>
    </div>
    <script src="https://kit.fontawesome.com/b5ac015c11.js" crossorigin="anonymous"></script>
  </body>
</html>
