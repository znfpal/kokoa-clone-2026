<!DOCTYPE html>
<html lang="en">
  <head>
    <title>KokoaTalk - Chats</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="phone">
      <div class="status-bar">
        <div class="status-bar__column">No Service <i class="fa-solid fa-wifi"></i></div>
        <div class="status-bar__column">21:23</div>
        <div class="status-bar__column"><i class="fa-solid fa-lock"></i><span>100%</span><span class="battery"><span class="battery__level"></span></span></div>
      </div>
      <main class="screen">
        <header class="page-header">
          <h1 class="page-title">Chats</h1>
          <div class="header-icons">
            <a class="icon-link" href="#"><i class="fa-solid fa-magnifying-glass"></i></a>
            <a class="icon-link" href="#"><i class="fa-regular fa-comment-dots"></i><i class="fa-solid fa-plus" style="font-size: 16px"></i></a>
            <a class="icon-link" href="#"><i class="fa-solid fa-music"></i></a>
            <a class="icon-link" href="settings.html"><i class="fa-solid fa-gear"></i></a>
          </div>
        </header>
        <section class="chats-list">
          <a class="chat-preview" href="chat.html">
            <div class="avatar avatar--talk"></div>
            <div>
              <h2 class="chat-preview__title">KakaoTalk</h2>
              <p class="chat-preview__message">Please check My Kakao Account Info</p>
            </div>
            <div class="chat-preview__meta">
              <span class="chat-preview__time">21:22</span>
              <span class="badge">1</span>
            </div>
          </a>
        </section>
      </main>
      <nav class="nav">
        <a class="nav__link" href="friends.html"><i class="fa-regular fa-user"></i></a>
        <a class="nav__link nav__link--active" href="chats.html"><i class="fa-solid fa-comment"></i><span class="badge nav__badge">1</span></a>
        <a class="nav__link" href="find.html"><i class="fa-solid fa-magnifying-glass"></i></a>
        <a class="nav__link" href="more.html"><i class="fa-solid fa-ellipsis"></i><span class="dot nav__dot"></span></a>
      </nav>
    </div>
    <script src="https://kit.fontawesome.com/b5ac015c11.js" crossorigin="anonymous"></script>
  </body>
</html>
